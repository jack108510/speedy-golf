<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Speedy Golf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:#000;touch-action:none}
canvas{display:block}
.ui{position:fixed;z-index:10;pointer-events:none}
#hud{top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;color:#fff;font:600 13px -apple-system,sans-serif}
.tag{background:rgba(0,0,0,.6);padding:5px 12px;border-radius:16px;backdrop-filter:blur(6px)}
#yd{position:fixed;top:48px;left:50%;transform:translateX(-50%);color:#fff;font:700 20px -apple-system,sans-serif;z-index:10;text-shadow:0 2px 8px rgba(0,0,0,.6)}
#ph{position:fixed;top:72px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font:600 11px -apple-system,sans-serif;z-index:10;letter-spacing:2px}
#pwr{position:fixed;right:14px;top:50%;transform:translateY(-50%);width:26px;height:180px;background:rgba(0,0,0,.6);border-radius:13px;border:2px solid rgba(255,255,255,.15);overflow:hidden;z-index:10;display:none}
#pwf{position:absolute;bottom:0;left:0;right:0;border-radius:11px;background:linear-gradient(to top,#22c55e,#eab308,#ef4444)}
#spn{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);width:180px;height:18px;background:rgba(0,0,0,.6);border-radius:9px;border:2px solid rgba(255,255,255,.15);z-index:10;display:none}
#spv{position:absolute;top:2px;bottom:2px;width:3px;background:#fff;border-radius:2px;left:50%}
#spl{position:fixed;left:50%;bottom:134px;transform:translateX(-50%);color:#fff;font:600 10px -apple-system,sans-serif;z-index:10;letter-spacing:1px;display:none}
#cbs{position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:6px}
.cb{padding:6px 10px;border-radius:6px;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;font:600 10px -apple-system,sans-serif;text-align:center;backdrop-filter:blur(4px)}
.cb.on{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.15)}
#btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.12);border:3px solid rgba(255,255,255,.25);color:#fff;font:700 11px/1.2 -apple-system,sans-serif;text-align:center;letter-spacing:1px;z-index:10;cursor:pointer;-webkit-tap-highlight-color:transparent;padding-top:20px}
#btn:active{background:rgba(255,255,255,.3)}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:20;font-family:-apple-system,sans-serif}
#ov h1{font-size:28px;margin-bottom:6px}
#ov p{font-size:13px;opacity:.6;margin:12px 0 20px;text-align:center;max-width:260px;line-height:1.6}
#ov button{padding:14px 40px;border-radius:28px;border:none;background:#22c55e;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="hud"><span class="tag" id="ht">Hole 1 · Par 4</span><span class="tag" id="st">Stroke: 0</span></div>
<div id="yd"></div><div id="ph"></div>
<div id="pwr"><div id="pwf"></div></div>
<div id="spn"><div id="spv"></div></div><div id="spl">SPIN</div>
<div id="cbs">
  <div class="cb on" id="c0" onclick="pickClub(0)">Driver<br><small>250yd</small></div>
  <div class="cb" id="c1" onclick="pickClub(1)">Iron<br><small>150yd</small></div>
  <div class="cb" id="c2" onclick="pickClub(2)">Wedge<br><small>80yd</small></div>
  <div class="cb" id="c3" onclick="pickClub(3)">Putter<br><small>30yd</small></div>
</div>
<div id="btn" onclick="swing()">🏌️<br>SWING</div>
<div id="ov"><h1>⛳ Speedy Golf</h1><p>3-click swing: Aim → Power → Spin<br>Then run after your ball!</p><button onclick="teeOff()">Tee Off</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- SCENE ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 150, 600);

const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
const ren = new THREE.WebGLRenderer({antialias: true});
ren.setSize(innerWidth, innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio, 2));
ren.shadowMap.enabled = true;
ren.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(ren.domElement);
addEventListener('resize', () => { cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix(); ren.setSize(innerWidth, innerHeight); });

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xfff5e0, 1);
sun.position.set(60, 100, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -120; sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120; sun.shadow.camera.bottom = -120;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x2d5a27, 0.4));

// --- TERRAIN ---
// Ground
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 500),
  new THREE.MeshLambertMaterial({color: 0x3a7a30})
);
gnd.rotation.x = -Math.PI/2; gnd.position.set(0, 0, -100);
gnd.receiveShadow = true; scene.add(gnd);

// Fairway
const fw = new THREE.Mesh(
  new THREE.PlaneGeometry(36, 340),
  new THREE.MeshLambertMaterial({color: 0x5a9e45})
);
fw.rotation.x = -Math.PI/2; fw.position.set(0, 0.02, -100);
fw.receiveShadow = true; scene.add(fw);

// Fairway mow stripes
for (let z = 80; z > -260; z -= 12) {
  const s = new THREE.Mesh(
    new THREE.PlaneGeometry(34, 5),
    new THREE.MeshLambertMaterial({color: (z/12)%2 ? 0x4e9138 : 0x5ca84a})
  );
  s.rotation.x = -Math.PI/2; s.position.set(0, 0.03, z);
  s.receiveShadow = true; scene.add(s);
}

// Green
const gn = new THREE.Mesh(
  new THREE.CircleGeometry(15, 32),
  new THREE.MeshLambertMaterial({color: 0x4db84d})
);
gn.rotation.x = -Math.PI/2; gn.position.set(0, 0.06, -260);
gn.receiveShadow = true; scene.add(gn);

// Hole cup
const cup = new THREE.Mesh(
  new THREE.CylinderGeometry(0.7, 0.7, 0.15, 16),
  new THREE.MeshBasicMaterial({color: 0x111111})
);
cup.position.set(0, 0.07, -260); scene.add(cup);

// Flag pole + flag
const pole = new THREE.Mesh(
  new THREE.CylinderGeometry(0.04, 0.04, 4.5, 6),
  new THREE.MeshPhongMaterial({color: 0xeeeeee})
);
pole.position.set(0, 2.25, -260); scene.add(pole);
const flagShape = new THREE.Shape();
flagShape.moveTo(0,0); flagShape.lineTo(2,0); flagShape.lineTo(0,1.2); flagShape.lineTo(0,0);
const flagMesh = new THREE.Mesh(
  new THREE.ShapeGeometry(flagShape),
  new THREE.MeshLambertMaterial({color: 0xef4444, side: THREE.DoubleSide})
);
flagMesh.position.set(0, 4.2, -260); scene.add(flagMesh);

// Tee box
const tb = new THREE.Mesh(
  new THREE.BoxGeometry(8, 0.1, 3),
  new THREE.MeshLambertMaterial({color: 0x7a6845})
);
tb.position.set(0, 0.05, 80); tb.receiveShadow = true; scene.add(tb);

// Bunkers
function bunker(x, z, r) {
  const b = new THREE.Mesh(
    new THREE.CircleGeometry(r, 20),
    new THREE.MeshLambertMaterial({color: 0xe8d48c})
  );
  b.rotation.x = -Math.PI/2; b.position.set(x, 0.03, z);
  b.receiveShadow = true; scene.add(b);
}
bunker(-20, -170, 6); bunker(16, -110, 5); bunker(4, -245, 4);

// Water
const wt = new THREE.Mesh(
  new THREE.CircleGeometry(10, 24),
  new THREE.MeshPhongMaterial({color: 0x2878c8, transparent: true, opacity: 0.7, shininess: 80})
);
wt.rotation.x = -Math.PI/2; wt.position.set(20, 0.02, -30); scene.add(wt);

// Trees
function tree(x, z, s) {
  s = s || 1;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2*s, 0.3*s, 2.5*s, 6),
    new THREE.MeshLambertMaterial({color: 0x5a3a20})
  );
  trunk.position.set(x, 1.25*s, z); trunk.castShadow = true; scene.add(trunk);
  for (let i = 0; i < 3; i++) {
    const l = new THREE.Mesh(
      new THREE.SphereGeometry((2.5 - i*0.5)*s, 7, 5),
      new THREE.MeshLambertMaterial({color: i%2 ? 0x35853a : 0x2d7a2d})
    );
    l.position.set(x, (3 + i*0.9)*s, z); l.castShadow = true; scene.add(l);
  }
}
tree(-38,-30,1.3); tree(42,-70,1.5); tree(-36,-180,1.1); tree(44,-160,1.2);
tree(-48,20,1.1); tree(46,40,1.3); tree(-32,65,.9); tree(50,-210,1);
// Background forest
for (let i = 0; i < 15; i++) {
  const a = (i/15)*Math.PI*2, r = 100 + Math.random()*60;
  tree(Math.cos(a)*r, -100+Math.sin(a)*r, .6+Math.random()*.4);
}

// Clouds
const cloudGroup = [];
for (let i = 0; i < 6; i++) {
  const g = new THREE.Group();
  for (let j = 0; j < 4; j++) {
    const puff = new THREE.Mesh(
      new THREE.SphereGeometry(2+Math.random()*3, 6, 5),
      new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8})
    );
    puff.position.set((Math.random()-.5)*6, Math.random()*1.5, (Math.random()-.5)*4);
    g.add(puff);
  }
  g.position.set(-150+Math.random()*300, 50+Math.random()*20, -200+Math.random()*100);
  scene.add(g); cloudGroup.push(g);
}

// --- BALL ---
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.3, 12, 8),
  new THREE.MeshPhongMaterial({color: 0xffffff, shininess: 100})
);
ball.castShadow = true; scene.add(ball);
ball.position.set(0, 0.3, 80);

// --- GOLFER ---
const golfer = new THREE.Group();
// Pants
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.18,.2,.7,6), new THREE.MeshLambertMaterial({color:0x1e293b})
), {position: new THREE.Vector3(-.12,.35,0)}));
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.18,.2,.7,6), new THREE.MeshLambertMaterial({color:0x1e293b})
), {position: new THREE.Vector3(.12,.35,0)}));
// Shoes
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.BoxGeometry(.15,.08,.25), new THREE.MeshLambertMaterial({color:0x222})
), {position: new THREE.Vector3(-.12,.04,.04)}));
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.BoxGeometry(.15,.08,.25), new THREE.MeshLambertMaterial({color:0x222})
), {position: new THREE.Vector3(.12,.04,.04)}));
// Shirt
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.28,.25,.9,8), new THREE.MeshLambertMaterial({color:0x2563eb})
), {position: new THREE.Vector3(0,1.2,0)}));
// Head
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.SphereGeometry(.22,8,6), new THREE.MeshLambertMaterial({color:0xf0c8a0})
), {position: new THREE.Vector3(0,1.9,0)}));
// Cap
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.2,.24,.12,8), new THREE.MeshLambertMaterial({color:0x1e40af})
), {position: new THREE.Vector3(0,2.05,0)}));
golfer.add(Object.assign(new THREE.Mesh(
  new THREE.BoxGeometry(.4,.03,.22), new THREE.MeshLambertMaterial({color:0x1e40af})
), {position: new THREE.Vector3(0,1.99,.15)}));

// Arms group (for swing animation)
const armGroup = new THREE.Group();
armGroup.position.set(0, 1.5, 0);
// Left arm
armGroup.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.06,.06,.55,5), new THREE.MeshLambertMaterial({color:0xf0c8a0})
), {position: new THREE.Vector3(-.35, 0, 0)}));
// Right arm
armGroup.add(Object.assign(new THREE.Mesh(
  new THREE.CylinderGeometry(.06,.06,.55,5), new THREE.MeshLambertMaterial({color:0xf0c8a0})
), {position: new THREE.Vector3(.35, 0, 0)}));

// Club (attached to arm group)
const clubGroup = new THREE.Group();
clubGroup.position.set(.35, -.3, 0);
const clubColors = [0x444444, 0x888888, 0x999999, 0xaaaaaa];
const clubLens = [1.8, 1.3, 1.0, 0.8];
const clubMeshes = [];
for (let i = 0; i < 4; i++) {
  const cg = new THREE.Group();
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(.025,.025,clubLens[i],4),
    new THREE.MeshLambertMaterial({color:0x666666})
  );
  shaft.position.y = -clubLens[i]/2;
  cg.add(shaft);
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(.12,.04,.2),
    new THREE.MeshLambertMaterial({color: clubColors[i]})
  );
  head.position.y = -clubLens[i]; head.position.z = .05;
  cg.add(head);
  cg.visible = (i === 0);
  clubMeshes.push(cg);
  clubGroup.add(cg);
}
armGroup.add(clubGroup);
golfer.add(armGroup);
golfer.position.set(0, 0, 82);
golfer.castShadow = true;
scene.add(golfer);

// --- AIM LINE ---
const aimGeo = new THREE.BufferGeometry();
aimGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
const aimLine = new THREE.Line(aimGeo, new THREE.LineBasicMaterial({color: 0xffff00, transparent: true, opacity: 0.6}));
aimLine.visible = false; scene.add(aimLine);

// --- GAME STATE ---
let S = 'menu'; // menu, aim, swingAnim, power, spin, fly, roll, run, done
let strokes = 0, club = 0;
let aim = 0, aimD = 1;
let pwr = 0, pwrD = 1;
let spn = 0, spnD = 1;
let bvx = 0, bvy = 0, bvz = 0;
let swT = 0; // swing animation timer
let t = 0;
const TEE = new THREE.Vector3(0, 0.3, 80);
const HOLE = new THREE.Vector3(0, 0.3, -260);
const clubDist = [250, 150, 80, 30];
const clubLoft = [0.32, 0.42, 0.55, 0.12];

// DOM refs
const $yd = document.getElementById('yd');
const $ph = document.getElementById('ph');
const $st = document.getElementById('st');
const $pwr = document.getElementById('pwr');
const $pwf = document.getElementById('pwf');
const $spn = document.getElementById('spn');
const $spv = document.getElementById('spv');
const $spl = document.getElementById('spl');
const $ov = document.getElementById('ov');
const $cbs = document.getElementById('cbs');
const $btn = document.getElementById('btn');

function showClubs(v) { $cbs.style.display = v ? 'flex' : 'none'; }

window.pickClub = function(i) {
  if (S !== 'aim') return;
  club = i;
  document.querySelectorAll('.cb').forEach((b,j) => b.classList.toggle('on', j===i));
  clubMeshes.forEach((m,j) => m.visible = (j===i));
};

window.teeOff = function() {
  $ov.style.display = 'none';
  ball.position.copy(TEE); bvx=bvy=bvz=0;
  golfer.position.set(0,0,82); golfer.rotation.y=0;
  strokes=0; $st.textContent='Stroke: 0';
  S='aim'; aim=0; aimD=1;
  showClubs(true); $ph.textContent='AIM';
  $pwr.style.display='none'; $spn.style.display='none'; $spl.style.display='none';
  pickClub(0);
};

window.swing = function() {
  if (S==='aim') {
    S='swingAnim'; swT=0;
    aimLine.visible=false; showClubs(false); $ph.textContent='';
  } else if (S==='power') {
    S='spin'; spn=0; spnD=1;
    $pwr.style.display='none';
    $spn.style.display='block'; $spl.style.display='block';
    $ph.textContent='SPIN';
  } else if (S==='spin') {
    launch();
  }
};

// Also support spacebar and touch
document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); swing(); } });
$btn.addEventListener('touchstart', e => { e.preventDefault(); swing(); }, {passive:false});

function launch() {
  S='fly'; strokes++; $st.textContent='Stroke: '+strokes;
  $ph.textContent=''; $spn.style.display='none'; $spl.style.display='none';
  aimLine.visible=false;

  const maxD = clubDist[club];
  const loft = clubLoft[club];
  const speed = (pwr * 0.7 + 0.3) * maxD / 100;
  const spinF = (spn - 0.5) * 0.15;

  bvx = Math.sin(aim) * speed + spinF;
  bvy = loft * speed;
  bvz = -Math.cos(aim) * speed;
}

function endHole(msg) {
  S='done';
  setTimeout(() => {
    $ov.querySelector('h1').textContent = '⛳ Hole Complete!';
    $ov.querySelector('p').textContent = msg;
    $ov.querySelector('button').textContent = 'Play Again';
    $ov.style.display = 'flex'; showClubs(false);
    $ov.querySelector('button').onclick = teeOff;
  }, 1000);
}

function yardage() {
  const d = ball.position.distanceTo(new THREE.Vector3(HOLE.x, ball.position.y, HOLE.z));
  return Math.round(d * 1.5);
}

// --- UPDATE ---
function update(dt) {
  t += dt;

  // Clouds
  cloudGroup.forEach((c,i) => {
    c.position.x += 0.03 * (i%2 ? 1 : -1);
    if (c.position.x > 200) c.position.x = -200;
    if (c.position.x < -200) c.position.x = 200;
  });

  // Water shimmer
  wt.material.opacity = 0.6 + Math.sin(t*2)*0.1;

  // Flag wave
  flagMesh.rotation.y = Math.sin(t*4)*0.15;

  // Swing animation
  if (S === 'swingAnim') {
    swT += dt;
    if (swT < 0.4) {
      armGroup.rotation.x = -(swT/0.4) * 1.8; // backswing
    } else if (swT < 0.55) {
      armGroup.rotation.x = -1.8; // hold
    } else if (swT < 0.7) {
      armGroup.rotation.x = -1.8 + ((swT-0.55)/0.15)*3; // downswing
    } else {
      armGroup.rotation.x = 1.2;
      S = 'power'; pwr=0; pwrD=1;
      $pwr.style.display='block'; $ph.textContent='POWER';
    }
  }

  // Power oscillation
  if (S === 'power') {
    pwr += pwrD * 0.8 * dt;
    if (pwr>=1){pwr=1;pwrD=-1} if(pwr<=0){pwr=0;pwrD=1}
    $pwf.style.height = (pwr*100)+'%';
  }

  // Spin oscillation
  if (S === 'spin') {
    spn += spnD * 1.0 * dt;
    if (spn>=1){spn=1;spnD=-1} if(spn<=0){spn=0;spnD=1}
    $spv.style.left = (spn*90+5)+'%';
  }

  // Aim oscillation
  if (S === 'aim') {
    aim += aimD * 0.8 * dt;
    if (aim>0.6) aimD=-1; if(aim<-0.6) aimD=1;
    golfer.rotation.y = aim;

    // Aim line
    aimLine.visible = true;
    const p = aimLine.geometry.attributes.position.array;
    p[0]=ball.position.x; p[1]=0.8; p[2]=ball.position.z;
    p[3]=ball.position.x+Math.sin(aim)*18; p[4]=0.8; p[5]=ball.position.z-Math.cos(aim)*18;
    aimLine.geometry.attributes.position.needsUpdate = true;

    // Auto club select
    const y = yardage();
    if (y < 25) pickClub(3); else if (y < 70) pickClub(2); else if (y < 140) pickClub(1); else pickClub(0);
  }

  // Ball flight
  if (S === 'fly') {
    bvy -= 15 * dt; // gravity
    bvx += windDir * 0.5 * dt;
    ball.position.x += bvx;
    ball.position.y += bvy;
    ball.position.z += bvz;

    // Ground hit
    if (ball.position.y <= 0.3 && bvy < 0) {
      ball.position.y = 0.3;
      if (bvy < -2) {
        bvy = -bvy * 0.2;
        bvx *= 0.5; bvz *= 0.5;
      } else {
        bvy = 0; S = 'roll';
      }
    }

    // Hole check (in air or on ground)
    checkHole();

    // Water
    const dx = ball.position.x-20, dz = ball.position.z+30;
    if (Math.sqrt(dx*dx+dz*dz) < 9 && ball.position.y < 1) {
      strokes++; $st.textContent='Stroke: '+strokes;
      endHole('💧 Water! +1 penalty — '+strokes+' strokes'); return;
    }

    // OB
    if (ball.position.y<-3||Math.abs(ball.position.x)>80||ball.position.z>100||ball.position.z<-300) {
      strokes++; $st.textContent='Stroke: '+strokes;
      endHole('OB! +1 penalty — '+strokes+' strokes'); return;
    }
  }

  // Ball rolling
  if (S === 'roll') {
    const onGreen = Math.sqrt(ball.position.x**2+(ball.position.z+260)**2) < 15;
    const fric = onGreen ? 0.99 : 0.975;
    bvx *= fric; bvz *= fric;
    ball.position.x += bvx; ball.position.z += bvz;
    ball.position.y = 0.3;

    if (checkHole()) return;

    if (Math.abs(bvx)<0.01 && Math.abs(bvz)<0.01) {
      bvx=bvz=0;
      S='run';
    }
  }

  // Golfer run to ball
  if (S === 'run') {
    const dx = ball.position.x - golfer.position.x;
    const dz = (ball.position.z + 2) - golfer.position.z;
    const dd = Math.sqrt(dx*dx+dz*dz);
    golfer.rotation.y = Math.atan2(dx, dz);
    // Leg anim
    const ls = Math.sin(t*12)*0.4;
    golfer.children[0].rotation.x = ls; golfer.children[1].rotation.x = -ls;

    if (dd > 1.5) {
      const spd = Math.min(dd, 20) * dt;
      golfer.position.x += (dx/dd)*spd;
      golfer.position.z += (dz/dd)*spd;
    } else {
      golfer.children[0].rotation.x = 0; golfer.children[1].rotation.x = 0;
      golfer.position.x = ball.position.x + Math.sin(golfer.rotation.y+Math.PI)*1;
      golfer.position.z = ball.position.z + Math.cos(golfer.rotation.y+Math.PI)*1;
      armGroup.rotation.x = 0;
      S='aim'; $ph.textContent='AIM'; showClubs(true);
    }
  }

  // Yardage display
  if (S!=='menu'&&S!=='done') $yd.textContent = yardage()+' yds';

  // --- CAMERA ---
  if (S === 'menu') {
    cam.position.set(Math.sin(t*0.2)*25, 12, Math.cos(t*0.2)*25-100);
    cam.lookAt(0, 0, -100);
  } else if (S === 'aim') {
    const behind = new THREE.Vector3(
      golfer.position.x + Math.sin(golfer.rotation.y)*8,
      4,
      golfer.position.z + Math.cos(golfer.rotation.y)*8
    );
    cam.position.lerp(behind, 0.08);
    cam.lookAt(ball.position.x, 0.5, ball.position.z);
  } else if (S === 'fly') {
    cam.position.lerp(new THREE.Vector3(ball.position.x-5, ball.position.y+6, ball.position.z+10), 0.04);
    cam.lookAt(ball.position);
  } else if (S === 'roll') {
    cam.position.lerp(new THREE.Vector3(ball.position.x-3, 3, ball.position.z+6), 0.06);
    cam.lookAt(ball.position);
  } else if (S === 'run') {
    const behind = new THREE.Vector3(
      golfer.position.x - Math.sin(golfer.rotation.y)*6,
      3.5,
      golfer.position.z - Math.cos(golfer.rotation.y)*6
    );
    cam.position.lerp(behind, 0.06);
    cam.lookAt(golfer.position.x, 1.5, golfer.position.z);
  } else if (S === 'swingAnim') {
    const behind = new THREE.Vector3(
      golfer.position.x + Math.sin(golfer.rotation.y)*6,
      3,
      golfer.position.z + Math.cos(golfer.rotation.y)*6
    );
    cam.position.lerp(behind, 0.1);
    cam.lookAt(ball.position.x, 0.5, ball.position.z);
  }
}

let windDir = 0;

function checkHole() {
  const dx = ball.position.x, dz = ball.position.z + 260;
  const hd = Math.sqrt(dx*dx+dz*dz);
  const spd = Math.sqrt(bvx*bvx+bvz*bvz);
  if (hd < 1.5 && spd < 0.6) {
    ball.position.set(0, 0.2, -260);
    const s = strokes - 4;
    const n = {'-3':'Albatross!🦅','-2':'Eagle!🦅','-1':'Birdie!🐦','0':'Par 👏','1':'Bogey','2':'Double Bogey'};
    endHole((n[s]||'+'+strokes+' Over')+' — '+strokes+' strokes');
    return true;
  }
  return false;
}

// --- RENDER LOOP ---
let lastTime = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  ren.render(scene, cam);
}
requestAnimationFrame(loop);

// Init wind
windDir = (Math.random()-.5)*.4;
document.getElementById('ph').textContent = '';
</script>
</body>
</html>
