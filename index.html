<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Speedy Golf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none}
canvas{display:block;position:absolute;top:0;left:0}
#hud{position:absolute;top:0;left:0;right:0;padding:12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;color:#fff;font-size:14px;z-index:10}
.hud-box{background:rgba(0,0,0,.6);padding:6px 14px;border-radius:20px;backdrop-filter:blur(4px)}
#powerbar{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:30px;height:200px;background:rgba(0,0,0,.6);border-radius:15px;border:2px solid rgba(255,255,255,.2);overflow:hidden;z-index:10;opacity:0;transition:opacity .15s}
#powerfill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#22c55e,#eab308,#ef4444);border-radius:13px;transition:height .02s}
#swingbtn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);color:#fff;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
#swingbtn:active{background:rgba(255,255,255,.35);transform:translateX(-50%) scale(.95)}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:20}
#overlay h1{font-size:28px;margin-bottom:8px}
#overlay p{font-size:14px;opacity:.7;margin-bottom:24px;text-align:center;max-width:280px;line-height:1.6}
#overlay button{padding:14px 40px;border-radius:30px;border:none;background:#22c55e;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#overlay button:active{background:#16a34a}
#spinbar{position:absolute;left:50%;bottom:110px;transform:translateX(-50%);width:200px;height:24px;background:rgba(0,0,0,.6);border-radius:12px;border:2px solid rgba(255,255,255,.2);z-index:10;opacity:0;transition:opacity .15s}
#spinneedle{position:absolute;top:2px;bottom:2px;width:4px;background:#fff;border-radius:2px;left:50%;transition:left .03s}
#spinlabel{position:absolute;left:50%;bottom:140px;transform:translateX(-50%);color:#fff;font-size:11px;font-weight:600;z-index:10;opacity:0;transition:opacity .15s;letter-spacing:1px}
#wind{position:absolute;top:50px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;z-index:10;opacity:.6;pointer-events:none}
#status{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:600;z-index:10;opacity:0;transition:opacity .15s;letter-spacing:1px;text-transform:uppercase;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.5)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div class="hud-box">Hole 1 · Par 4</div>
  <div class="hud-box" id="strokeInfo">Stroke: 0</div>
  <div class="hud-box" id="distInfo">0 yds</div>
</div>
<div id="wind"></div>
<div id="status">AIM</div>
<div id="powerbar"><div id="powerfill"></div></div>
<div id="spinbar"><div id="spinneedle"></div></div>
<div id="spinlabel">SPIN</div>
<div id="swingbtn">SWING</div>
<div id="overlay">
  <h1>⛳ Speedy Golf</h1>
  <p>3-click swing: Aim → Power → Spin<br>Tap SWING or press SPACE</p>
  <button id="startBtn">Tee Off</button>
</div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d');
const powerbar=document.getElementById('powerbar'),powerfill=document.getElementById('powerfill');
const spinbar=document.getElementById('spinbar'),spinneedle=document.getElementById('spinneedle');
const spinlabel=document.getElementById('spinlabel');
const swingbtn=document.getElementById('swingbtn');
const hudStroke=document.getElementById('strokeInfo');
const hudDist=document.getElementById('distInfo');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const statusEl=document.getElementById('status');
const windEl=document.getElementById('wind');

let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// Course
const tee={x:200,y:620},flag={x:200,y:80};
const fairway=[{x:100,y:80,w:200,h:570}];
const green={x:140,y:40,w:120,h:90};
const sand=[{x:115,y:380,w:45,h:40},{x:255,y:250,w:40,h:35}];
const water=[{x:240,y:460,w:65,h:55}];
const trees=[{x:50,y:200,r:18},{x:345,y:150,r:22},{x:55,y:500,r:15},{x:340,y:400,r:20},{x:145,y:300,r:12},{x:285,y:510,r:14}];

let ball={x:0,y:0,vx:0,vy:0};
let state='menu',stroke=0;
let aimAngle=0,aimDir=1;
let powerLevel=0,powerDir=1;
let spinLevel=0,spinDir=1;
let windSpeed=0,windDir=0;
let trail=[];

function resetBall(){ball.x=tee.x;ball.y=tee.y;ball.vx=0;ball.vy=0;trail=[]}

startBtn.onclick=function(){
  overlay.style.display='none';
  resetBall();stroke=0;
  hudStroke.textContent='Stroke: 0';
  windSpeed=2+Math.random()*8;
  windDir=(Math.random()-.5)*.5;
  windEl.textContent='💨 Wind: '+Math.round(windSpeed)+' mph '+(windDir>0?'→':'←');
  state='aim';
  showStatus('AIM');
};

function showStatus(txt){statusEl.textContent=txt;statusEl.style.opacity=txt?'1':'0'}

function doSwing(){
  if(state==='aim'){
    state='power';powerLevel=0;powerDir=1;
    showStatus('POWER');
  }else if(state==='power'){
    state='spin';spinLevel=0;spinDir=1;
    powerbar.style.opacity='0';
    spinbar.style.opacity='1';spinlabel.style.opacity='1';
    showStatus('SPIN');
  }else if(state==='spin'){
    state='fly';stroke++;
    hudStroke.textContent='Stroke: '+stroke;
    spinbar.style.opacity='0';spinlabel.style.opacity='0';
    showStatus('');
    
    const speed=powerLevel*12+4;
    ball.vx=Math.sin(aimAngle)*speed;
    ball.vy=-Math.cos(aimAngle)*speed;
    const spinForce=(spinLevel-.5)*3;
    ball.vx+=spinForce;
    trail=[];
  }
}

swingbtn.addEventListener('click',doSwing);
swingbtn.addEventListener('touchstart',function(e){e.preventDefault();doSwing()},{passive:false});
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();doSwing()}});

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function onGreen(p){return p.x>green.x&&p.x<green.x+green.w&&p.y>green.y&&p.y<green.y+green.h}
function onSand(p){return sand.some(s=>p.x>s.x&&p.x<s.x+s.w&&p.y>s.y&&p.y<s.y+s.h)}
function onWater(p){return water.some(w=>p.x>w.x&&p.x<w.x+w.w&&p.y>w.y&&p.y<w.y+w.h)}

function showResult(text){
  setTimeout(function(){
    overlay.querySelector('h1').textContent='⛳ Hole Complete!';
    overlay.querySelector('p').textContent=text;
    startBtn.textContent='Play Again';
    overlay.style.display='flex';
    state='menu';
    startBtn.onclick=function(){
      overlay.style.display='none';
      resetBall();stroke=0;
      hudStroke.textContent='Stroke: 0';
      windSpeed=2+Math.random()*8;windDir=(Math.random()-.5)*.5;
      windEl.textContent='💨 Wind: '+Math.round(windSpeed)+' mph '+(windDir>0?'→':'←');
      state='aim';showStatus('AIM');
      startBtn.textContent='Tee Off';
    };
  },800);
}

function update(){
  if(state==='aim'){
    aimAngle+=aimDir*.03;
    if(aimAngle>.7)aimDir=-1;if(aimAngle<-.7)aimDir=1;
    powerbar.style.opacity='0';
  }
  if(state==='power'){
    powerLevel+=powerDir*.022;
    if(powerLevel>=1){powerLevel=1;powerDir=-1}
    if(powerLevel<=0){powerLevel=0;powerDir=1}
    powerfill.style.height=(powerLevel*100)+'%';
    powerbar.style.opacity='1';
  }
  if(state==='spin'){
    spinLevel+=spinDir*.03;
    if(spinLevel>=1){spinLevel=1;spinDir=-1}
    if(spinLevel<=0){spinLevel=0;spinDir=1}
    spinneedle.style.left=(spinLevel*96+2)+'%';
  }
  if(state==='fly'){
    trail.push({x:ball.x,y:ball.y});
    if(trail.length>40)trail.shift();
    
    ball.vy+=.15;
    ball.vx+=windDir*windSpeed*.002;
    ball.x+=ball.vx;
    ball.y+=ball.vy;
    
    // Check hole
    if(dist(ball,flag)<12&&Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)<6){
      const s=stroke-4;
      const n={'-3':'Albatross!🦅','-2':'Eagle!🦅','-1':'Birdie!🐦','0':'Par 👏','1':'Bogey','2':'Double Bogey'};
      state='done';showResult((n[s]||'+'+stroke)+' — '+stroke+' strokes');return;
    }
    
    // Tree bounce
    for(const t of trees){
      if(dist(ball,t)<t.r+4){
        ball.vx*=-.4;ball.vy*=-.3;
        ball.x+=ball.vx*2;ball.y+=ball.vy*2;
        break;
      }
    }
    
    // Ground hit
    if(ball.vy>0&&ball.y>=flag.y-10){
      state='roll';ball.vy=0;
    }
    // OB check
    if(ball.x<-10||ball.x>410||ball.y<0||ball.y>680){
      state='roll';ball.vy=0;
    }
  }
  if(state==='roll'){
    const f=onGreen(ball)?.955:onSand(ball)?.91:.972;
    ball.vx*=f;ball.vy*=f;
    ball.x+=ball.vx;ball.y+=ball.vy;
    
    // Water check
    if(onWater(ball)){
      stroke++;hudStroke.textContent='Stroke: '+stroke;
      state='done';showResult('💧 Water Hazard! +1 penalty — '+stroke+' strokes');return;
    }
    // Hole check
    if(dist(ball,flag)<12&&Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)<5){
      const s=stroke-4;
      const n={'-3':'Albatross!🦅','-2':'Eagle!🦅','-1':'Birdie!🐦','0':'Par 👏','1':'Bogey','2':'Double Bogey'};
      state='done';showResult((n[s]||'+'+stroke)+' — '+stroke+' strokes');return;
    }
    // Stopped
    if(Math.abs(ball.vx)<.04&&Math.abs(ball.vy)<.04){
      ball.vx=0;ball.vy=0;
      if(ball.x<0||ball.x>400||ball.y>670||ball.y<0){
        stroke++;hudStroke.textContent='Stroke: '+stroke;
        state='done';showResult('Out of Bounds! +1 penalty — '+stroke+' strokes');return;
      }
      state='aim';showStatus('AIM');
    }
  }
  if(state!=='menu'&&state!=='done'){
    hudDist.textContent=Math.round(dist(ball,flag)*.5)+' yds';
  }
}

function draw(){
  X.clearRect(0,0,W,H);
  const sc=Math.min(W/400,H/700);
  const ox=(W-400*sc)/2,oy=(H-700*sc)/2;
  X.save();X.translate(ox,oy);X.scale(sc,sc);
  
  // Rough
  X.fillStyle='#2d5a27';X.fillRect(-10,-10,420,720);
  // Fairway
  X.fillStyle='#4a8c3f';
  fairway.forEach(f=>X.fillRect(f.x,f.y,f.w,f.h));
  // Sand
  X.fillStyle='#e8d68c';
  sand.forEach(s=>{X.beginPath();X.ellipse(s.x+s.w/2,s.y+s.h/2,s.w/2,s.h/2,0,0,Math.PI*2);X.fill()});
  // Water
  X.fillStyle='#3b82f6';
  water.forEach(w=>{X.beginPath();X.ellipse(w.x+w.w/2,w.y+w.h/2,w.w/2,w.h/2,0,0,Math.PI*2);X.fill()});
  // Green
  X.fillStyle='#5cb85c';X.fillRect(green.x,green.y,green.w,green.h);
  X.strokeStyle='#4a9e4a';X.lineWidth=2;X.strokeRect(green.x,green.y,green.w,green.h);
  // Hole
  X.fillStyle='#111';X.beginPath();X.arc(flag.x,flag.y,8,0,Math.PI*2);X.fill();
  // Flag
  X.strokeStyle='#fff';X.lineWidth=2;X.beginPath();X.moveTo(flag.x,flag.y);X.lineTo(flag.x,flag.y-35);X.stroke();
  X.fillStyle='#ef4444';X.beginPath();X.moveTo(flag.x,flag.y-35);X.lineTo(flag.x+18,flag.y-28);X.lineTo(flag.x,flag.y-21);X.fill();
  // Tee
  X.fillStyle='#8B7355';X.fillRect(tee.x-25,tee.y-5,50,10);
  // Trees
  trees.forEach(t=>{
    X.fillStyle='#3d2b1f';X.fillRect(t.x-3,t.y+5,6,t.r);
    X.fillStyle='#2d7a2d';X.beginPath();X.arc(t.x,t.y,t.r,0,Math.PI*2);X.fill();
    X.fillStyle='#1f6b1f';X.beginPath();X.arc(t.x-3,t.y-3,t.r*.55,0,Math.PI*2);X.fill();
  });
  // Trail
  if(trail.length>1){
    X.strokeStyle='rgba(255,255,255,.25)';X.lineWidth=1;X.setLineDash([3,3]);
    X.beginPath();trail.forEach((p,i)=>{i?X.lineTo(p.x,p.y):X.moveTo(p.x,p.y)});X.stroke();X.setLineDash([]);
  }
  // Ball
  if(state!=='menu'&&state!=='done'){
    X.fillStyle='#fff';X.beginPath();X.arc(ball.x,ball.y,6,0,Math.PI*2);X.fill();
    X.strokeStyle='#ddd';X.lineWidth=1;X.stroke();
  }
  // Aim arrow
  if(state==='aim'){
    X.strokeStyle='rgba(255,255,255,.5)';X.lineWidth=2;X.setLineDash([5,5]);
    X.beginPath();X.moveTo(ball.x,ball.y);
    const len=70;
    X.lineTo(ball.x+Math.sin(aimAngle)*len,ball.y-Math.cos(aimAngle)*len);X.stroke();X.setLineDash([]);
    X.fillStyle='rgba(255,255,255,.7)';X.beginPath();
    X.arc(ball.x+Math.sin(aimAngle)*len,ball.y-Math.cos(aimAngle)*len,4,0,Math.PI*2);X.fill();
  }
  X.restore();
}

function loop(){
  if(state!=='menu'){update();draw()}
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
